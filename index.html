<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYAT Session Mapping</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 30px; background-color: #f8fafc; color: #0f172a; max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #1e293b; font-weight: 800; }
        .setup-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #475569; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        button { background-color: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; width: 100%; font-size: 16px; }
        button:hover { background-color: #4338ca; }
        
        .legend-container { text-align: center; margin-bottom: 25px; font-size: 14px; display: none; }
        .legend-item { display: inline-block; padding: 6px 12px; margin: 0 8px; border-radius: 6px; font-weight: 600; }
        .hint { color: #64748b; font-style: italic; margin-top: 8px; }
        table { width: 100%; border-collapse: separate; border-spacing: 2px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); display: none; }
        th, td { padding: 15px; text-align: center; width: 14.2%; border-radius: 4px; }
        th { background-color: #1e293b; color: #f8fafc; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        td { font-size: 15px; font-weight: 600; }
        .time-label { background-color: #f1f5f9; color: #475569; font-weight: 700; font-size: 13px; }
        .mentor-block { background-color: #4f46e5 !important; color: white !important; }
        .clickable { cursor: pointer; transition: transform 0.1s, filter 0.2s; border: 1px solid rgba(0,0,0,0.05); }
        .clickable:hover { transform: scale(0.98); filter: brightness(0.95); }
        
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); }
        .modal-content { background-color: #ffffff; margin: 5% auto; padding: 25px; width: 60%; border-radius: 12px; max-height: 80vh; overflow-y: auto; }
        .close { color: #94a3b8; float: right; font-size: 24px; font-weight: bold; cursor: pointer; }
        .details-table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; display: table;}
        .details-table th, .details-table td { border-bottom: 1px solid #e2e8f0; padding: 12px; text-align: left; font-size: 14px; font-weight: 500; }
        .details-table th { background-color: #f8fafc; color: #475569; }
        .status-free { color: #059669; }
        .status-busy { color: #dc2626; }
        .divider hr { border: 0; border-top: 2px dashed #cbd5e1; margin: 10px 0; }
        #loader { text-align: center; color: #4f46e5; font-weight: bold; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>FYAT Session Mapping Routine</h1>

    <div class="setup-card">
        <h3>Mentor Setup</h3>
        <div class="form-group">
            <label>Mentor Name</label>
            <input type="text" id="mentorName" placeholder="e.g., Tausif">
        </div>
        <div class="form-group">
            <label>Your Enrolled Courses</label>
            <input type="text" id="mentorCourses" placeholder="e.g., CSE340-21, CSE321-20">
        </div>
        <div class="form-group">
            <label>Upload Mentees CSV File</label>
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <button onclick="generateRoutine()">Generate Routine</button>
        <div id="loader">Fetching university data and processing...</div>
    </div>

    <div class="legend-container" id="legend">
        <span class="legend-item mentor-block" id="legendMentor">Mentor (1/1)</span>
        <span class="legend-item" style="background-color: #10b981; color: white;">All Free</span>
        <span class="legend-item" style="background-color: #ef4444; color: white;">None Free</span>
        <div class="hint">Numbers indicate (Available / Total). Click any cell to view detailed student availability.</div>
    </div>

    <table id="routineTable"></table>

    <div id="myModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle" style="color: #1e293b; margin-top: 0;">Slot Details</h3>
        <table class="details-table" id="detailsTable">
            <thead>
                <tr>
                    <th style="width: 25%;">Student ID</th>
                    <th style="width: 50%;">Name</th>
                    <th style="width: 25%;">Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
      </div>
    </div>

    <script>
        // Replace this URL with your raw GitHub user content URL for connect.json
        const JSON_API_URL = 'https://raw.githubusercontent.com/IttehadT/fyat-session-mapper/refs/heads/main/connect.json';

        let studentNames = {};

        function checkOverlap(slotStart, slotEnd, sessionStart, sessionEnd) {
            return (slotStart < sessionEnd) && (slotEnd > sessionStart);
        }

        function parseCSVRow(str) {
            let arr = [];
            let quote = false;
            let col = '';
            for (let i = 0; i < str.length; i++) {
                let cc = str[i], nc = str[i+1];
                if (cc === '"' && quote && nc === '"') { col += '"'; i++; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { arr.push(col); col = ''; continue; }
                col += cc;
            }
            arr.push(col);
            return arr;
        }

        async function generateRoutine() {
            const mentorNameInput = document.getElementById('mentorName').value || 'Mentor';
            document.getElementById('legendMentor').innerText = `${mentorNameInput} (1/1)`;
            const mentorCoursesInput = document.getElementById('mentorCourses').value;
            const csvInput = document.getElementById('csvFile').files[0];

            if (!csvInput) { alert("Please upload a CSV file."); return; }

            document.getElementById('loader').style.display = 'block';

            try {
                // In a real environment, uncomment the fetch to use the Github raw link
                // const response = await fetch(JSON_API_URL);
                // const courseData = await response.json();
                
                // For this demo, assuming user uploads connect.json or we mock it. 
                // Because of CORS or file restrictions, we'll prompt for the JSON file 
                // if the API URL isn't configured yet. 
                const courseData = []; // Replace with actual fetch

                const scheduleMap = {};
                courseData.forEach(item => {
                    let secName = String(item.sectionName || '');
                    const match = secName.match(/^([A-Za-z0-9]+)/);
                    if (match) secName = match[1];
                    
                    const courseKey = `${item.courseCode}-${secName}`.toUpperCase();
                    let schedules = [];
                    
                    if (item.sectionSchedule && item.sectionSchedule.classSchedules) {
                        schedules.push(...item.sectionSchedule.classSchedules);
                    }
                    if (item.labSchedules) {
                        schedules.push(...item.labSchedules);
                    }
                    scheduleMap[courseKey] = schedules;
                });

                const reader = new FileReader();
                reader.onload = function(e) {
                    const text = e.target.result;
                    const lines = text.split('\\n').filter(line => line.trim() !== '');
                    const studentData = [];
                    const allStudentIds = new Set();
                    
                    for (let i = 1; i < lines.length; i++) {
                        const row = parseCSVRow(lines[i]);
                        if (row.length >= 5) {
                            
                            const name = row[2] ? row[2].trim() : "Unknown";
                            const studentId = row[3] ? row[3].trim() : "Unknown";
                            const courseString = row[row.length - 1]; 
                            
                            const regex = /([A-Za-z]{3,4})[^\w]*(\d{3})[^\w]*(\d{1,2})/g;
                            let matches;
                            const courses = [];
                            while ((matches = regex.exec(courseString)) !== null) {
                                courses.push(`${matches[1].toUpperCase()}${matches[2]}-${matches[3].padStart(2, '0')}`);
                            }
                            
                            if (courses.length > 0) {
                                studentData.push({ id: studentId, name: name, courses: courses });
                                allStudentIds.add(studentId);
                                studentNames[studentId] = name;
                            }
                        }
                    }

                    const days = ["SATURDAY", "SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY"];
                    const slots = [
                        ["08:00:00", "09:20:00", "08:00 AM - 09:20 AM"],
                        ["09:30:00", "10:50:00", "09:30 AM - 10:50 AM"],
                        ["11:00:00", "12:20:00", "11:00 AM - 12:20 PM"],
                        ["12:30:00", "13:50:00", "12:30 PM - 01:50 PM"],
                        ["14:00:00", "15:20:00", "02:00 PM - 03:20 PM"],
                        ["15:30:00", "16:50:00", "03:30 PM - 04:50 PM"],
                        ["17:00:00", "18:20:00", "05:00 PM - 06:20 PM"]
                    ];

                    const grid = {};
                    days.forEach(day => {
                        grid[day] = {};
                        slots.forEach(s => {
                            grid[day][s[0]] = { busy_students: new Set(), mentor: false };
                        });
                    });

                    const mentorCourses = mentorCoursesInput.split(',').map(c => {
                        const m = c.match(/([A-Za-z]{3,4})[^\\w]*(\\d{3})[^\\w]*(\\d{1,2})/);
                        return m ? `${m[1].toUpperCase()}${m[2]}-${m[3].padStart(2, '0')}` : null;
                    }).filter(Boolean);

                    mentorCourses.forEach(course => {
                        if (scheduleMap[course]) {
                            scheduleMap[course].forEach(session => {
                                const day = session.day;
                                const sessStart = session.startTime;
                                const sessEnd = session.endTime;
                                if (grid[day] && sessStart && sessEnd) {
                                    slots.forEach(s => {
                                        if (checkOverlap(s[0], s[1], sessStart, sessEnd)) {
                                            grid[day][s[0]].mentor = true;
                                        }
                                    });
                                }
                            });
                        }
                    });

                    studentData.forEach(student => {
                        student.courses.forEach(course => {
                            if (scheduleMap[course]) {
                                scheduleMap[course].forEach(session => {
                                    const day = session.day;
                                    const sessStart = session.startTime;
                                    const sessEnd = session.endTime;
                                    if (grid[day] && sessStart && sessEnd) {
                                        slots.forEach(s => {
                                            if (checkOverlap(s[0], s[1], sessStart, sessEnd)) {
                                                grid[day][s[0]].busy_students.add(student.id);
                                            }
                                        });
                                    }
                                });
                            }
                        });
                    });

                    buildTable(days, slots, grid, allStudentIds, studentData.length, mentorNameInput);
                };
                reader.readAsText(csvInput);

            } catch (error) {
                alert("Error fetching university data. Check the JSON URL.");
                console.error(error);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function buildTable(days, slots, grid, allStudentIds, totalStudents, mentorName) {
            let html = "<tr><th>Time / Day</th>";
            days.forEach(day => html += `<th>${day}</th>`);
            html += "</tr>";

            slots.forEach(s => {
                const startTime = s[0];
                const timeLabel = s[2];
                html += `<tr><td class='time-label'>${timeLabel}</td>`;
                
                days.forEach(day => {
                    const cell = grid[day][startTime];
                    const busyArray = Array.from(cell.busy_students);
                    const freeArray = Array.from(allStudentIds).filter(x => !cell.busy_students.has(x));
                    
                    const available = totalStudents - busyArray.length;
                    const ratioText = `(${available}/${totalStudents})`;
                    const dataAttr = `data-busy='${busyArray.join(',')}' data-free='${freeArray.join(',')}' data-title='${day} ${timeLabel}'`;

                    if (cell.mentor) {
                        html += `<td class='mentor-block clickable' ${dataAttr} onclick='showDetails(this)'>${mentorName} <br><span style='font-size: 13px; opacity: 0.9;'>${ratioText}</span></td>`;
                    } else if (totalStudents === 0) {
                        html += `<td style='background-color: #f1f5f9; color: #94a3b8;' class='clickable' ${dataAttr} onclick='showDetails(this)'>No Data <br><span style='font-size: 13px;'>${ratioText}</span></td>`;
                    } else {
                        const ratio = available / totalStudents;
                        const r = Math.floor(239 - (239 - 16) * ratio);
                        const g = Math.floor(68 + (185 - 68) * ratio);
                        const b = Math.floor(68 + (129 - 68) * ratio);
                        const textColor = (ratio < 0.3 || ratio > 0.7) ? "#ffffff" : "#0f172a";
                        
                        html += `<td style='background-color: rgb(${r},${g},${b}); color: ${textColor};' class='clickable' ${dataAttr} onclick='showDetails(this)'>${ratioText}</td>`;
                    }
                });
                html += "</tr>";
            });

            document.getElementById('routineTable').innerHTML = html;
            document.getElementById('routineTable').style.display = 'table';
            document.getElementById('legend').style.display = 'block';
        }

        function showDetails(cell) {
            const title = cell.getAttribute('data-title');
            const busy = cell.getAttribute('data-busy') ? cell.getAttribute('data-busy').split(',') : [];
            const free = cell.getAttribute('data-free') ? cell.getAttribute('data-free').split(',') : [];

            document.getElementById('modalTitle').innerText = 'Availability: ' + title;
            const tbody = document.querySelector('#detailsTable tbody');
            tbody.innerHTML = '';

            const busyStudents = busy.filter(Boolean).map(id => ({ id, name: studentNames[id] || 'Unknown', status: 'Busy', cls: 'status-busy' }));
            const freeStudents = free.filter(Boolean).map(id => ({ id, name: studentNames[id] || 'Unknown', status: 'Free', cls: 'status-free' }));

            busyStudents.sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
            freeStudents.sort((a, b) => a.id.localeCompare(b.id, undefined, {numeric: true}));

            if (busyStudents.length === 0 && freeStudents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No student data available</td></tr>';
            } else {
                busyStudents.forEach(s => {
                    tbody.innerHTML += `<tr><td>${s.id}</td><td>${s.name}</td><td class="${s.cls}"><strong>${s.status}</strong></td></tr>`;
                });
                
                if (busyStudents.length > 0 && freeStudents.length > 0) {
                    tbody.innerHTML += '<tr class="divider"><td colspan="3" style="padding: 0;"><hr></td></tr>';
                }
                
                freeStudents.forEach(s => {
                    tbody.innerHTML += `<tr><td>${s.id}</td><td>${s.name}</td><td class="${s.cls}"><strong>${s.status}</strong></td></tr>`;
                });
            }

            document.getElementById('myModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('myModal').style.display = 'none'; }
        window.onclick = function(event) {
            const modal = document.getElementById('myModal');
            if (event.target == modal) modal.style.display = "none";
        }
    </script>
</body>

</html>
